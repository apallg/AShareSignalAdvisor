version: "3.8"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-qilin123}
      MYSQL_DATABASE: qilin_stock
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-qilin123}
      MYSQL_DATABASE: qilin_stock
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      COZE_API_TOKEN: ${COZE_API_TOKEN}
      COZE_BOT_ID: ${COZE_BOT_ID}
      COZE_WORKFLOW_ID: ${COZE_WORKFLOW_ID}
      STRATEGIES_HOST_DIR: ${STRATEGIES_HOST_DIR:-/app/strategies}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./core:/app/core
      - ./engine:/app/engine
      - ./strategies:/app/strategies
      - ./nlp:/app/nlp
      - ./agents:/app/agents
      - ./utils:/app/utils
      - ./execution:/app/execution
      - ./db:/app/db
      - ./config.py:/app/config.py
      - cache_data:/app/cache
      - data_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
  cache_data:
  data_data:
